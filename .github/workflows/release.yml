name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Folia ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download all signature files from draft release
          mkdir -p sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir sigs 2>/dev/null || true

          # Build latest.json with Node for reliable JSON handling
          node -e "
          const fs = require('fs');
          const path = require('path');
          const sigs = fs.readdirSync('sigs');
          const platforms = {};

          for (const sig of sigs) {
            const signature = fs.readFileSync(path.join('sigs', sig), 'utf8').trim();
            const base = sig.replace(/\.sig$/, '');

            if (sig.includes('aarch64')) {
              platforms['darwin-aarch64'] = { signature, url: '$BASE_URL/' + base };
            } else if (sig.includes('x64') && sig.includes('.app.')) {
              platforms['darwin-x86_64'] = { signature, url: '$BASE_URL/' + base };
            } else if (sig.includes('x64') && sig.includes('.nsis.')) {
              platforms['windows-x86_64'] = { signature, url: '$BASE_URL/' + base };
            } else if (sig.includes('x64') && sig.includes('.msi.')) {
              platforms['windows-x86_64'] = { signature, url: '$BASE_URL/' + base };
            }
          }

          const manifest = {
            version: '$VERSION',
            notes: 'Folia $VERSION',
            pub_date: '$PUB_DATE',
            platforms
          };
          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(JSON.stringify(Object.keys(platforms)));
          "

      - name: Upload latest.json and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          gh release edit "${{ github.ref_name }}" \
            --draft=false --repo "${{ github.repository }}"

      - name: Sync to Gitee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${GITEE_OWNER}/Folia"
          GITEE_BASE="https://gitee.com/${REPO}/releases/download/${TAG}"

          # Create Gitee release
          RELEASE_ID=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"Folia ${VERSION}\",
              \"body\": \"Folia ${VERSION} - 自动同步自 GitHub\",
              \"target_commitish\": \"main\",
              \"prerelease\": false
            }" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")

          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create Gitee release, skipping sync"
            exit 0
          fi
          echo "Gitee release ID: ${RELEASE_ID}"

          # Download all assets from GitHub release (excluding latest.json)
          mkdir -p release-assets
          gh release download "$TAG" --repo "${{ github.repository }}" --dir release-assets

          # Upload build artifacts to Gitee (skip latest.json, we'll generate a Gitee version)
          for FILE in release-assets/*; do
            FILENAME=$(basename "$FILE")
            if [ "$FILENAME" = "latest.json" ]; then continue; fi
            echo "Uploading ${FILENAME} to Gitee..."
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/${REPO}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}" > /dev/null
          done

          # Generate Gitee-specific latest.json with Gitee download URLs
          GITEE_PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          node -e "
          const fs = require('fs');
          const path = require('path');
          const sigs = fs.readdirSync('sigs');
          const platforms = {};

          for (const sig of sigs) {
            const signature = fs.readFileSync(path.join('sigs', sig), 'utf8').trim();
            const base = sig.replace(/\.sig$/, '');

            if (sig.includes('aarch64')) {
              platforms['darwin-aarch64'] = { signature, url: '${GITEE_BASE}/' + base };
            } else if (sig.includes('x64') && sig.includes('.app.')) {
              platforms['darwin-x86_64'] = { signature, url: '${GITEE_BASE}/' + base };
            } else if (sig.includes('x64') && sig.includes('.nsis.')) {
              platforms['windows-x86_64'] = { signature, url: '${GITEE_BASE}/' + base };
            } else if (sig.includes('x64') && sig.includes('.msi.')) {
              platforms['windows-x86_64'] = { signature, url: '${GITEE_BASE}/' + base };
            }
          }

          const manifest = {
            version: '${VERSION}',
            notes: 'Folia ${VERSION}',
            pub_date: '${GITEE_PUB_DATE}',
            platforms
          };
          fs.writeFileSync('latest-gitee.json', JSON.stringify(manifest, null, 2) + '\n');
          "

          # Upload Gitee latest.json (named latest.json on Gitee)
          curl -s -X POST \
            "https://gitee.com/api/v5/repos/${REPO}/releases/${RELEASE_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@latest-gitee.json;filename=latest.json" > /dev/null

          echo "Gitee release sync complete"
